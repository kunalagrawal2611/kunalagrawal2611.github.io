name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "assets/**"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update Scholar metrics
        run: npm run update-metrics
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Publish build to site root
        run: cp -r dist/* .

      - name: Commit production build
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets/ favicon.svg og-image.svg 404.html profile.jpg Kunal_Agrawal_CV.pdf .nojekyll
          git diff --staged --quiet && echo "No site changes" && exit 0
          git commit -m "chore: deploy production build to site root"
          git push

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
