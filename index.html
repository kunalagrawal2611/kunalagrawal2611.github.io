<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Kunal Agrawal is a PhD Researcher in Computer Vision at the University of Dayton, specializing in generative AI, multi-modal fusion, and scene understanding.">
<meta property="og:title" content="Kunal Agrawal — Computer Vision Researcher">
<meta property="og:description" content="Portfolio and research publications of Kunal Agrawal.">
<meta property="og:type" content="website">
<title>Kunal Agrawal — Computer Vision Researcher</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080b10;
    --bg2: #0d1117;
    --bg3: #111820;
    --surface: #141c26;
    --surface2: #1a2333;
    --accent: #00d4aa;
    --accent-hover: #00f0c0;
    --text: #e8edf4;
    --text2: #8fa3b8;
    --text3: #4d6070;
    --border: rgba(0,212,170,0.15);
    --border2: rgba(255,255,255,0.06);
    --glow: 0 0 40px rgba(0,212,170,0.08);
    --nav-bg: rgba(8,11,16,0.88);
    --dot-color: rgba(0,212,170,0.08);
    --input-bg: #0d1117;
    --input-border: rgba(255,255,255,0.08);
    --input-focus: rgba(0,212,170,0.25);
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
    --toggle-track: #1a2333;
  }
  [data-theme="light"] {
    --bg: #f4f6f9;
    --bg2: #eaecf1;
    --bg3: #dde0e8;
    --surface: #ffffff;
    --surface2: #f0f2f7;
    --accent: #008f73;
    --accent-hover: #00b892;
    --text: #0d1117;
    --text2: #4a5568;
    --text3: #8fa3b8;
    --border: rgba(0,143,115,0.18);
    --border2: rgba(0,0,0,0.08);
    --glow: 0 0 40px rgba(0,143,115,0.08);
    --nav-bg: rgba(244,246,249,0.92);
    --dot-color: rgba(0,143,115,0.06);
    --input-bg: #f8fafc;
    --input-border: rgba(0,0,0,0.1);
    --input-focus: rgba(0,143,115,0.25);
    --shadow: 0 8px 32px rgba(0,0,0,0.1);
    --toggle-track: #dde0e8;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    overflow-x: hidden;
    transition: background 0.35s ease, color 0.35s ease;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.4;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: radial-gradient(circle, var(--dot-color) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none; z-index: 0;
  }

  /* ── NAV ──────────────────────────────────────────────── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 1.1rem 4rem;
    display: flex; align-items: center; justify-content: space-between;
    background: var(--nav-bg);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border2);
    transition: background 0.35s, border-color 0.35s;
  }
  .nav-logo { font-family: 'DM Mono', monospace; font-size: 0.85rem; color: var(--accent); letter-spacing: 0.1em; text-decoration: none; }
  .nav-right { display: flex; align-items: center; gap: 1.8rem; }
  .nav-links { display: flex; gap: 2.5rem; list-style: none; }
  .nav-links a { font-size: 0.82rem; font-weight: 500; color: var(--text2); text-decoration: none; letter-spacing: 0.05em; text-transform: uppercase; transition: color 0.2s; }
  .nav-links a:hover { color: var(--accent); }

  .nav-hamburger {
    display: none; flex-direction: column; justify-content: center;
    gap: 5px; width: 32px; height: 32px;
    background: none; border: none; cursor: pointer; padding: 4px; flex-shrink: 0;
  }
  .nav-hamburger span { display: block; width: 100%; height: 2px; background: var(--text2); border-radius: 2px; transition: transform 0.3s, opacity 0.3s, background 0.2s; }
  .nav-hamburger:hover span { background: var(--accent); }
  .nav-hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .nav-hamburger.open span:nth-child(2) { opacity: 0; }
  .nav-hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  .mobile-menu {
    display: none; position: fixed; top: 61px; left: 0; right: 0; z-index: 99;
    background: var(--nav-bg); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border2);
    padding: 1.2rem 1.5rem; flex-direction: column; gap: 0;
    transform: translateY(-8px); opacity: 0;
    transition: transform 0.25s ease, opacity 0.25s ease;
    pointer-events: none;
  }
  .mobile-menu.open { display: flex; transform: translateY(0); opacity: 1; pointer-events: all; }
  .mobile-menu a { font-size: 0.9rem; font-weight: 500; color: var(--text2); text-decoration: none; letter-spacing: 0.05em; text-transform: uppercase; padding: 0.8rem 0; border-bottom: 1px solid var(--border2); transition: color 0.2s; }
  .mobile-menu a:last-child { border-bottom: none; }
  .mobile-menu a:hover { color: var(--accent); }

  .nav-cv-btn {
    display: inline-flex; align-items: center; gap: 7px; padding: 7px 16px;
    background: var(--accent); color: #000;
    font-family: 'DM Mono', monospace; font-size: 0.72rem; font-weight: 500;
    letter-spacing: 0.07em; text-transform: uppercase;
    border: none; border-radius: 5px; cursor: pointer; text-decoration: none;
    transition: background 0.2s, transform 0.2s; white-space: nowrap;
  }
  .nav-cv-btn:hover { background: var(--accent-hover); transform: translateY(-1px); }

  .theme-toggle { position: relative; width: 48px; height: 26px; cursor: pointer; flex-shrink: 0; }
  .theme-toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
  .toggle-track { position: absolute; inset: 0; background: var(--toggle-track); border-radius: 100px; border: 1px solid var(--border2); transition: background 0.3s; display: flex; align-items: center; justify-content: space-between; padding: 0 5px; font-size: 0.6rem; }
  .toggle-thumb { position: absolute; top: 3px; left: 3px; width: 18px; height: 18px; border-radius: 50%; background: var(--accent); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); box-shadow: 0 1px 4px rgba(0,0,0,0.3); }
  [data-theme="light"] .toggle-thumb { transform: translateX(22px); }

  section { position: relative; z-index: 1; }

  /* ── HERO ─────────────────────────────────────────────── */
  #hero { min-height: 100vh; display: flex; align-items: center; padding: 8rem 4rem 4rem; max-width: 1200px; margin: 0 auto; }
  .hero-inner { max-width: 750px; }
  .hero-tag { display: inline-flex; align-items: center; gap: 8px; font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--accent); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 2rem; padding: 6px 14px; border: 1px solid var(--border); border-radius: 100px; background: rgba(0,212,170,0.05); }
  [data-theme="light"] .hero-tag { background: rgba(0,143,115,0.06); }
  .hero-tag::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .hero-name { font-family: 'DM Serif Display', serif; font-size: clamp(3.5rem,7vw,6rem); line-height: 1.05; color: var(--text); margin-bottom: 1.5rem; letter-spacing: -0.02em; }
  .hero-name em { font-style: italic; color: var(--accent); }
  .hero-desc { font-size: 1.15rem; color: var(--text2); line-height: 1.8; margin-bottom: 3rem; max-width: 580px; font-weight: 300; }
  .hero-desc strong { color: var(--text); font-weight: 500; }
  .hero-cta { display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; }
  .btn-primary { padding: 14px 28px; background: var(--accent); color: #000; font-family: 'Outfit', sans-serif; font-size: 0.88rem; font-weight: 600; letter-spacing: 0.04em; border: none; border-radius: 6px; text-decoration: none; cursor: pointer; transition: all 0.2s; text-transform: uppercase; }
  .btn-primary:hover { background: var(--accent-hover); transform: translateY(-2px); }
  .btn-secondary { padding: 14px 28px; background: transparent; color: var(--text); font-family: 'Outfit', sans-serif; font-size: 0.88rem; font-weight: 500; letter-spacing: 0.04em; border: 1px solid var(--border2); border-radius: 6px; text-decoration: none; cursor: pointer; transition: all 0.2s; text-transform: uppercase; }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-cv { display: inline-flex; align-items: center; gap: 8px; padding: 14px 28px; background: var(--surface); color: var(--accent); font-family: 'Outfit', sans-serif; font-size: 0.88rem; font-weight: 500; letter-spacing: 0.04em; border: 1px solid var(--border); border-radius: 6px; text-decoration: none; cursor: pointer; transition: all 0.2s; text-transform: uppercase; }
  .btn-cv:hover { background: rgba(0,212,170,0.08); transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,212,170,0.12); }
  [data-theme="light"] .btn-cv:hover { background: rgba(0,143,115,0.06); box-shadow: 0 4px 20px rgba(0,143,115,0.1); }
  .hero-stats { display: flex; gap: 3rem; margin-top: 4rem; padding-top: 3rem; border-top: 1px solid var(--border2); }
  .stat-num { font-family: 'DM Serif Display', serif; font-size: 2.5rem; color: var(--accent); line-height: 1; margin-bottom: 0.3rem; }
  .stat-label { font-size: 0.78rem; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; }

  /* ── SECTION LABELS ───────────────────────────────────── */
  .section-label { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--accent); letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 1rem; display: flex; align-items: center; gap: 12px; }
  .section-label::after { content: ''; flex: 1; max-width: 60px; height: 1px; background: var(--accent); opacity: 0.4; }
  .section-title { font-family: 'DM Serif Display', serif; font-size: clamp(2rem,4vw,3rem); color: var(--text); margin-bottom: 3rem; line-height: 1.2; }

  /* ── ABOUT ────────────────────────────────────────────── */
  #about { padding: 8rem 4rem; max-width: 1200px; margin: 0 auto; }
  .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: start; }
  .about-text { font-size: 1rem; color: var(--text2); line-height: 1.9; font-weight: 300; }
  .about-text p { margin-bottom: 1.5rem; }
  .about-text strong { color: var(--text); font-weight: 500; }
  .about-cards { display: flex; flex-direction: column; gap: 1rem; }
  .about-card { padding: 1.2rem 1.5rem; background: var(--surface); border: 1px solid var(--border2); border-radius: 10px; border-left: 3px solid var(--accent); transition: all 0.2s; }
  .about-card:hover { background: var(--surface2); transform: translateX(4px); }
  .about-card-title { font-size: 0.82rem; color: var(--accent); font-family: 'DM Mono', monospace; letter-spacing: 0.05em; margin-bottom: 0.3rem; }
  .about-card-val { font-size: 0.95rem; color: var(--text); font-weight: 500; }
  .about-card-sub { font-size: 0.82rem; color: var(--text2); margin-top: 0.2rem; }
  .about-card.award-card { border-left-color: #f59e0b; background: rgba(245,158,11,0.05); }
  .about-card.award-card:hover { background: rgba(245,158,11,0.09); }
  .about-card.award-card .about-card-title { color: #f59e0b; }

  /* ── EXPERIENCE ───────────────────────────────────────── */
  #experience { padding: 8rem 4rem; background: var(--bg2); border-top: 1px solid var(--border2); border-bottom: 1px solid var(--border2); }
  .exp-inner { max-width: 1200px; margin: 0 auto; }
  .timeline { display: flex; flex-direction: column; }
  .timeline-item { display: grid; grid-template-columns: 200px 1fr; gap: 2rem; padding: 2.5rem 0; border-bottom: 1px solid var(--border2); }
  .timeline-item:last-child { border-bottom: none; }
  .tl-date { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--text3); padding-top: 0.4rem; letter-spacing: 0.05em; line-height: 1.6; }
  .tl-date span { display: block; color: var(--accent); margin-bottom: 0.3rem; font-size: 0.72rem; }
  .tl-role { font-size: 1.05rem; font-weight: 600; color: var(--text); margin-bottom: 0.3rem; }
  .tl-org { font-size: 0.88rem; color: var(--accent); margin-bottom: 0.2rem; font-family: 'DM Mono', monospace; }
  .tl-award { display: inline-flex; align-items: center; gap: 6px; font-size: 0.72rem; color: #f59e0b; background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.2); border-radius: 4px; padding: 3px 10px; margin: 0.5rem 0 0.8rem; font-family: 'DM Mono', monospace; }
  .tl-award::before { content: '★'; font-size: 0.65rem; }
  .tl-bullets { list-style: none; margin-top: 0.8rem; display: flex; flex-direction: column; gap: 0.6rem; }
  .tl-bullets li { font-size: 0.9rem; color: var(--text2); padding-left: 1.2rem; position: relative; line-height: 1.7; font-weight: 300; }
